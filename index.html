<!DOCTYPE html>
<html>
<head>
    <title>PDF Viewer</title>
    <style>
        body {
            margin: 0;
            background: #f5f5f5;
        }
        .viewer {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

<object class="viewer" data="file.pdf" type="application/pdf">
    <p>Your browser cannot display PDF. 
    <a href="file.pdf">Click here to download</a></p>
</object>

</body>
</html>
